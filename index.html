<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>مكتبة النماذج التعليمية</title>
<style>
body{
font-family: Arial;
background:#f4f4f4;
text-align:center;
}
h1{
color:#0b5ed7;
}
.box{
background:white;
width:300px;
margin:20px auto;
padding:20px;
border-radius:10px;
}
button{
background:#0b5ed7;
color:white;
padding:10px;
border:none;
border-radius:5px;
}
</style>
</head>

<body>

<h1>مكتبة النماذج التعليمية</h1>

<div class="box">
<h3>نموذج شهادة طالب</h3>
<button>تحميل</button>
</div>

<div class="box">
<h3>نموذج تقرير طالب</h3>
<button>تحميل</button>
</div>

<div class="box">
<h3>نموذج خطة درس</h3>
<button>تحميل</button>
</div>

</body>
</html>
